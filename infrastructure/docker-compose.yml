version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: interfaith
      POSTGRES_PASSWORD: interfaith
      POSTGRES_DB: interfaith
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  coturn:
    image: coturn/coturn:latest
    command: ["-n", "--log-file=stdout", "--min-port=49160", "--max-port=49200", "--realm=localhost", "--lt-cred-mech", "--user=demo:demo"]
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

volumes:
  pgdata:
